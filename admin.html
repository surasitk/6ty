<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>6ty° Admin — จัดการสินค้า</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { sixty: { blue:"#0FB5E8", blued:"#0a90c4", pink:"#EC0A8C", ink:"#0e2a3b", mist:"#f2fbff" } },
      fontFamily: { sans: ["Sarabun","system-ui","sans-serif"] },
    } } };
  </script>
  <style>
    body { font-family:"Sarabun",system-ui,sans-serif; }
    .grad { background-image:linear-gradient(135deg,#0FB5E8 0%,#6f4fd8 55%,#EC0A8C 100%); }
    .grad-text { background-image:linear-gradient(120deg,#0FB5E8,#EC0A8C); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .btn-grad { background-image:linear-gradient(120deg,#0FB5E8,#EC0A8C); color:#fff; border-radius:.85rem; font-weight:700; box-shadow:0 8px 18px -8px rgba(236,10,140,.5); transition:.15s; }
    .btn-grad:hover{filter:brightness(1.05);} .btn-grad:active{transform:scale(.98);} .btn-grad:disabled{opacity:.5;}
    .field { width:100%; border:1px solid #d7e3ea; border-radius:.85rem; padding:.65rem .9rem; outline:none; font-size:1rem; background:#fff; }
    .field:focus { border-color:#0FB5E8; box-shadow:0 0 0 3px rgba(15,181,232,.18); }
    .label { display:block; margin-bottom:.3rem; font-size:.85rem; font-weight:600; color:#33576b; }
    .card { border:1px solid #e7eef3; border-radius:1.1rem; background:#fff; padding:1rem; box-shadow:0 6px 20px -12px rgba(13,72,103,.25); }
    .pagebg { background: radial-gradient(1100px 320px at 20% -120px, rgba(15,181,232,.14), transparent 60%), radial-gradient(900px 300px at 95% 0, rgba(236,10,140,.09), transparent 55%), #f7fbfd; }
  </style>
</head>
<body class="pagebg text-sixty-ink min-h-screen">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="store.js?v=4"></script>

  <script type="text/plain" id="app-src">
    const { useState, useEffect } = React;
    const baht = (n) => "฿" + Number(n || 0).toLocaleString("th-TH");
    const emptyForm = () => ({ id:"", name:"", description:"", price:"", label:"", product_type:"", image:"", enabled:true });

    // Downscale an uploaded image to keep localStorage small.
    function fileToScaledDataURL(file, maxSide) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            const scale = Math.min(1, maxSide / Math.max(width, height));
            width = Math.round(width * scale); height = Math.round(height * scale);
            const cv = document.createElement("canvas");
            cv.width = width; cv.height = height;
            cv.getContext("2d").drawImage(img, 0, 0, width, height);
            resolve(cv.toDataURL("image/jpeg", 0.82));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Upload an image file straight to Cloudinary (unsigned preset) → returns a public URL.
    async function uploadToCloudinary(file, cfg) {
      const fd = new FormData();
      fd.append("file", file);
      fd.append("upload_preset", cfg.preset);
      const res = await fetch("https://api.cloudinary.com/v1_1/" + cfg.cloud + "/image/upload", { method: "POST", body: fd });
      const json = await res.json();
      if (!res.ok || !json.secure_url) throw new Error((json.error && json.error.message) || "อัปโหลดไป Cloudinary ไม่สำเร็จ");
      return json.secure_url;
    }

    function Logo({ size=44 }) {
      return (
        <div className="grad flex items-center justify-center rounded-2xl text-white" style={{ width:size, height:size }}>
          <span className="font-extrabold leading-none" style={{ fontSize:size*0.34 }}>6ty<span style={{ fontSize:size*0.18, verticalAlign:"super" }}>°</span></span>
        </div>
      );
    }

    function App() {
      const [products, setProducts] = useState([]);
      const [form, setForm] = useState(emptyForm());
      const [busy, setBusy] = useState(false);
      const [flash, setFlash] = useState("");
      const [addingType, setAddingType] = useState(false);
      const types = Store.types();
      const [cfg, setCfg] = useState(Store.imageConfig());
      const [showCfg, setShowCfg] = useState(false);
      const [uploadingId, setUploadingId] = useState(null);
      const cloudReady = !!(cfg.cloud && cfg.preset);
      function saveCfg() {
        Store.setImageConfig({ cloud: (cfg.cloud||"").trim(), preset: (cfg.preset||"").trim() });
        setFlash("บันทึกการตั้งค่าที่เก็บรูปแล้ว ✓");
        setTimeout(() => setFlash(""), 2500);
      }

      const refresh = () => setProducts(Store.all());
      useEffect(() => { refresh(); }, []);
      const moveUp = (id) => { Store.move(id, -1); refresh(); };
      const moveDown = (id) => { Store.move(id, +1); refresh(); };

      // Change a product's image directly from the list (uploads to Cloudinary if set).
      async function changeImage(p, file) {
        if (!file) return;
        setUploadingId(p.id);
        try {
          const url = cloudReady ? await uploadToCloudinary(file, cfg) : await fileToScaledDataURL(file, 640);
          Store.upsert(Object.assign({}, p, { image: url }));
          refresh();
        } catch (e) { alert("อัปโหลดรูปไม่สำเร็จ: " + (e && e.message ? e.message : e)); }
        finally { setUploadingId(null); }
      }

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      async function onImage(file) {
        if (!file) return;
        setBusy(true);
        try {
          if (cloudReady) {
            set("image", await uploadToCloudinary(file, cfg)); // permanent public URL
          } else {
            set("image", await fileToScaledDataURL(file, 640)); // local-only fallback (base64)
          }
        } catch (e) {
          alert("อัปโหลดรูปไม่สำเร็จ: " + (e && e.message ? e.message : e));
        } finally { setBusy(false); }
      }

      function save() {
        if (!form.name.trim()) return setFlash("กรุณากรอกชื่อสินค้า");
        if (form.price === "" || isNaN(Number(form.price))) return setFlash("กรุณากรอกราคาเป็นตัวเลข");
        const p = { ...form, name: form.name.trim(), description: form.description.trim(), price: Number(form.price) };
        try {
          Store.upsert(p);
          setForm(emptyForm());
          setAddingType(false);
          refresh();
          setFlash(form.id ? "อัปเดตสินค้าแล้ว ✓" : "เพิ่มสินค้าแล้ว ✓");
          setTimeout(() => setFlash(""), 2500);
        } catch { setFlash("บันทึกไม่สำเร็จ (พื้นที่เต็ม)"); }
      }

      function edit(p) { setForm({ ...p, price: String(p.price) }); setAddingType(false); window.scrollTo({ top:0, behavior:"smooth" }); }
      function toggle(id) { Store.toggle(id); refresh(); }
      function remove(id) { if (confirm("ลบสินค้านี้?")) { Store.remove(id); refresh(); } }

      return (
        <main className="mx-auto w-full max-w-3xl px-4 py-6">
          <header className="mb-6 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <Logo />
              <div>
                <h1 className="text-xl font-extrabold leading-none"><span className="grad-text">6ty°</span> Admin</h1>
                <p className="text-xs font-semibold tracking-wide text-gray-400">จัดการสินค้า</p>
              </div>
            </div>
            <a href="index.html" className="rounded-xl border-2 border-sixty-blue px-4 py-2 text-sm font-semibold text-sixty-blued">ดูหน้าร้าน →</a>
          </header>

          {/* image storage settings */}
          <section className="card mb-4">
            <button className="flex w-full items-center justify-between" onClick={()=>setShowCfg(s=>!s)}>
              <span className="font-bold">⚙️ ที่เก็บรูปภาพ (Cloudinary)</span>
              <span className={"rounded-full px-2.5 py-0.5 text-xs font-semibold " + (cloudReady ? "bg-emerald-100 text-emerald-700" : "bg-amber-100 text-amber-700")}>
                {cloudReady ? "● เชื่อมแล้ว" : "○ ยังไม่ตั้งค่า"}
              </span>
            </button>
            {showCfg && (
              <div className="mt-3 space-y-2">
                <p className="text-xs text-gray-400">
                  สมัครฟรีที่ <a href="https://cloudinary.com/users/register_free" target="_blank" rel="noopener" className="font-semibold text-sixty-blued underline">cloudinary.com</a> →
                  Settings → Upload → Add upload preset → ตั้ง <b>Signing Mode = Unsigned</b> → คัดลอก <b>Cloud name</b> และชื่อ <b>preset</b> มากรอก
                </p>
                <div className="grid grid-cols-2 gap-2">
                  <div><label className="label">Cloud name</label><input className="field" value={cfg.cloud||""} onChange={e=>setCfg({ ...cfg, cloud:e.target.value })} placeholder="เช่น dxxxxxxx" /></div>
                  <div><label className="label">Upload preset</label><input className="field" value={cfg.preset||""} onChange={e=>setCfg({ ...cfg, preset:e.target.value })} placeholder="เช่น 6ty_unsigned" /></div>
                </div>
                <button className="btn-grad px-5 py-2" onClick={saveCfg}>บันทึกการตั้งค่า</button>
                {!cloudReady && <p className="text-xs text-amber-600">ยังไม่ตั้งค่า — รูปจะถูกเก็บชั่วคราวในเบราว์เซอร์นี้เท่านั้น (ลูกค้าคนอื่นจะไม่เห็น และจำกัด ~5MB)</p>}
              </div>
            )}
          </section>

          {/* form */}
          <section className="card mb-6">
            <h2 className="mb-4 font-bold">{form.id ? "แก้ไขสินค้า" : "เพิ่มสินค้าใหม่"}</h2>
            <div className="grid gap-4 sm:grid-cols-[140px_1fr]">
              {/* image */}
              <div>
                <label className="label">รูปสินค้า</label>
                <label className="flex aspect-square w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl border-2 border-dashed border-gray-300 bg-gray-50 text-center text-xs text-gray-400 hover:border-sixty-blue">
                  {busy
                    ? <span className="text-sixty-blued">กำลังอัปโหลด…</span>
                    : form.image
                      ? <img src={form.image} alt="" className="h-full w-full object-cover" />
                      : <span>แตะเพื่อ<br/>อัปโหลดรูป</span>}
                  <input type="file" accept="image/*" className="hidden" onChange={e => onImage(e.target.files[0])} />
                </label>
                {form.image && <button className="mt-1 text-xs text-sixty-pink" onClick={() => set("image","")}>ลบรูป</button>}
              </div>
              {/* fields */}
              <div className="space-y-3">
                <div><label className="label">ชื่อสินค้า *</label><input className="field" value={form.name} onChange={e=>set("name",e.target.value)} placeholder="เช่น 6ty° แพ็ก 6 ขวด" /></div>
                <div><label className="label">รายละเอียดสินค้า</label><textarea className="field" rows={2} value={form.description} onChange={e=>set("description",e.target.value)} placeholder="เช่น น้ำแร่ธรรมชาติ 350 มล. × 6 ขวด" /></div>
                <div className="grid grid-cols-2 gap-3">
                  <div><label className="label">ราคา (บาท) *</label><input className="field" inputMode="numeric" value={form.price} onChange={e=>set("price",e.target.value.replace(/[^\d.]/g,""))} placeholder="90" /></div>
                  <div>
                    <label className="label">ป้าย (label)</label>
                    <select className="field" value={form.label} onChange={e=>set("label",e.target.value)}>
                      {Store.LABELS.map(l => <option key={l||"none"} value={l}>{l || "— ไม่มีป้าย —"}</option>)}
                    </select>
                  </div>
                </div>
                <div>
                  <label className="label">ประเภทสินค้า (product_type)</label>
                  {!addingType ? (
                    <select className="field" value={form.product_type}
                      onChange={e=>{ if(e.target.value==="__new__"){ setAddingType(true); set("product_type",""); } else set("product_type", e.target.value); }}>
                      <option value="">— เลือกประเภท —</option>
                      {types.map(t => <option key={t} value={t}>{t}</option>)}
                      <option value="__new__">＋ เพิ่มประเภทใหม่…</option>
                    </select>
                  ) : (
                    <div className="flex gap-2">
                      <input className="field" autoFocus placeholder="พิมพ์ประเภทใหม่ เช่น 750" value={form.product_type} onChange={e=>set("product_type", e.target.value)} />
                      <button className="shrink-0 rounded-xl border-2 border-gray-200 px-3 font-semibold text-gray-500" onClick={()=>setAddingType(false)}>เสร็จ</button>
                    </div>
                  )}
                </div>
                <label className="flex items-center gap-2 pt-1">
                  <input type="checkbox" className="h-5 w-5 accent-sixty-pink" checked={form.enabled} onChange={e=>set("enabled",e.target.checked)} />
                  <span className="text-sm font-semibold">แสดงสินค้านี้บนหน้าร้าน (Enable)</span>
                </label>
              </div>
            </div>

            {flash && <p className="mt-3 text-sm font-medium text-sixty-blued">{flash}</p>}
            <div className="mt-4 flex gap-2">
              <button className="btn-grad px-6 py-2.5" onClick={save} disabled={busy}>{busy ? "กำลังประมวลผลรูป…" : (form.id ? "บันทึกการแก้ไข" : "เพิ่มสินค้า")}</button>
              {form.id && <button className="rounded-xl border-2 border-gray-200 px-5 py-2.5 font-semibold text-gray-500" onClick={()=>{setForm(emptyForm());setAddingType(false);}}>ยกเลิก</button>}
            </div>
          </section>

          {/* list */}
          <section>
            <h2 className="mb-1 font-bold">สินค้าทั้งหมด ({products.length})</h2>
            <p className="mb-3 text-xs text-gray-400">ลำดับการแสดงผลบนหน้าร้าน — กดปุ่ม ▲ / ▼ เพื่อเลื่อนขึ้น/ลง</p>
            <div className="space-y-3">
              {products.map((p, idx) => (
                <div key={p.id} className="card flex items-center gap-3">
                  <div className="flex shrink-0 flex-col items-center gap-1">
                    <span className="text-[11px] font-bold text-gray-300">#{idx+1}</span>
                    <button disabled={idx===0} onClick={()=>moveUp(p.id)} aria-label="เลื่อนขึ้น"
                      className="h-7 w-9 rounded-lg border-2 border-sixty-blue text-sm font-bold leading-none text-sixty-blued transition hover:bg-sixty-mist disabled:opacity-25">▲</button>
                    <button disabled={idx===products.length-1} onClick={()=>moveDown(p.id)} aria-label="เลื่อนลง"
                      className="h-7 w-9 rounded-lg border-2 border-sixty-blue text-sm font-bold leading-none text-sixty-blued transition hover:bg-sixty-mist disabled:opacity-25">▼</button>
                  </div>
                  <label className="relative h-16 w-16 shrink-0 cursor-pointer overflow-hidden rounded-xl" title="แตะเพื่อเปลี่ยนรูป">
                    {uploadingId===p.id
                      ? <div className="grad flex h-16 w-16 items-center justify-center rounded-xl text-[10px] font-bold text-white">อัปโหลด…</div>
                      : p.image
                        ? <img src={p.image} alt="" className="h-16 w-16 rounded-xl object-cover" />
                        : <div className="grad flex h-16 w-16 items-center justify-center rounded-xl text-sm font-bold text-white">6ty°</div>}
                    <span className="absolute inset-x-0 bottom-0 bg-black/50 py-0.5 text-center text-[9px] font-semibold text-white">เปลี่ยนรูป</span>
                    <input type="file" accept="image/*" className="hidden" onChange={e=>changeImage(p, e.target.files[0])} />
                  </label>
                  <div className="min-w-0 flex-1">
                    <div className="flex flex-wrap items-center gap-2">
                      <p className="truncate font-bold">{p.name}</p>
                      {p.label && <span className="grad rounded-full px-2 py-0.5 text-[11px] font-semibold text-white">{p.label}</span>}
                      {p.product_type && <span className="rounded-full bg-sixty-mist px-2 py-0.5 text-[11px] font-semibold text-sixty-blued">ประเภท {p.product_type}</span>}
                    </div>
                    {p.description && <p className="truncate text-xs text-gray-400">{p.description}</p>}
                    <p className="text-sm font-semibold grad-text">{baht(p.price)}</p>
                  </div>
                  <div className="flex shrink-0 flex-col items-end gap-1.5">
                    <button onClick={()=>toggle(p.id)}
                      className={"rounded-full px-3 py-1 text-xs font-semibold " + (p.enabled ? "bg-emerald-100 text-emerald-700" : "bg-gray-200 text-gray-500")}>
                      {p.enabled ? "● แสดงอยู่" : "○ ซ่อนอยู่"}
                    </button>
                    <div className="flex gap-2 text-xs">
                      <button className="font-semibold text-sixty-blued" onClick={()=>edit(p)}>แก้ไข</button>
                      <button className="font-semibold text-sixty-pink" onClick={()=>remove(p.id)}>ลบ</button>
                    </div>
                  </div>
                </div>
              ))}
              {products.length === 0 && <p className="text-center text-sm text-gray-400">ยังไม่มีสินค้า — เพิ่มได้จากฟอร์มด้านบน</p>}
            </div>
            <button className="mt-5 text-xs text-gray-400 underline" onClick={()=>{ if(confirm("คืนค่าสินค้าเริ่มต้น?")){ Store.reset(); refresh(); } }}>คืนค่าสินค้าตัวอย่างเริ่มต้น</button>
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    (function () {
      try {
        var out = Babel.transform(document.getElementById("app-src").textContent, { presets: [["react", { runtime: "classic" }]] }).code;
        new Function(out)();
      } catch (e) {
        document.getElementById("root").innerHTML = '<pre style="padding:16px;color:#EC0A8C;white-space:pre-wrap">โหลดหน้า admin ไม่สำเร็จ: ' + (e&&e.message?e.message:e) + '</pre>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
