<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>6ty° Admin — แดชบอร์ด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { sixty: { blue:"#0FB5E8", blued:"#0a90c4", pink:"#EC0A8C", ink:"#0e2a3b", mist:"#f2fbff" } },
      fontFamily: { sans: ["Sarabun","system-ui","sans-serif"] },
    } } };
  </script>
  <style>
    body { font-family:"Sarabun",system-ui,sans-serif; }
    .grad { background-image:linear-gradient(135deg,#0FB5E8 0%,#6f4fd8 55%,#EC0A8C 100%); }
    .grad-text { background-image:linear-gradient(120deg,#0FB5E8,#EC0A8C); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .btn-grad { background-image:linear-gradient(120deg,#0FB5E8,#EC0A8C); color:#fff; border-radius:.85rem; font-weight:700; box-shadow:0 8px 18px -8px rgba(236,10,140,.5); transition:.15s; }
    .btn-grad:hover{filter:brightness(1.05);} .btn-grad:active{transform:scale(.98);} .btn-grad:disabled{opacity:.5;}
    .field { width:100%; border:1px solid #d7e3ea; border-radius:.85rem; padding:.65rem .9rem; outline:none; font-size:1rem; background:#fff; }
    .field:focus { border-color:#0FB5E8; box-shadow:0 0 0 3px rgba(15,181,232,.18); }
    .label { display:block; margin-bottom:.3rem; font-size:.85rem; font-weight:600; color:#33576b; }
    .card { border:1px solid #e7eef3; border-radius:1.1rem; background:#fff; padding:1rem; box-shadow:0 6px 20px -12px rgba(13,72,103,.25); }
  </style>
</head>
<body class="bg-gray-50 text-sixty-ink min-h-screen">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="store.js?v=10"></script>

  <script type="text/plain" id="app-src">
    const { useState, useEffect } = React;
    const baht = (n) => "฿" + Number(n || 0).toLocaleString("th-TH");
    const fmtDate = (s) => { try { return new Date(s).toLocaleString("th-TH", { dateStyle:"medium", timeStyle:"short" }); } catch(e){ return s||""; } };

    async function uploadToCloudinary(file, cfg) {
      const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", cfg.preset);
      const res = await fetch("https://api.cloudinary.com/v1_1/" + cfg.cloud + "/image/upload", { method:"POST", body:fd });
      const json = await res.json();
      if (!res.ok || !json.secure_url) throw new Error((json.error && json.error.message) || "อัปโหลดไป Cloudinary ไม่สำเร็จ");
      return json.secure_url;
    }
    function fileToScaledDataURL(file, maxSide) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => { const img = new Image(); img.onload = () => {
          let { width, height } = img; const scale = Math.min(1, maxSide / Math.max(width, height));
          width = Math.round(width*scale); height = Math.round(height*scale);
          const cv = document.createElement("canvas"); cv.width=width; cv.height=height;
          cv.getContext("2d").drawImage(img,0,0,width,height); resolve(cv.toDataURL("image/jpeg",0.82));
        }; img.onerror=reject; img.src=reader.result; };
        reader.onerror=reject; reader.readAsDataURL(file);
      });
    }
    function Logo({ size=40 }) {
      return (<div className="grad flex items-center justify-center rounded-2xl text-white" style={{ width:size, height:size }}>
        <span className="font-extrabold leading-none" style={{ fontSize:size*0.34 }}>6ty<span style={{ fontSize:size*0.18, verticalAlign:"super" }}>°</span></span>
      </div>);
    }
    function StatusPill({ on, onText, offText, onClick }) {
      return <button onClick={onClick} className={"rounded-full px-3 py-1 text-xs font-semibold " + (on ? "bg-emerald-100 text-emerald-700" : "bg-gray-200 text-gray-500")}>{on ? (onText||"● เปิด") : (offText||"○ ปิด")}</button>;
    }

    const PROVINCES = ["กรุงเทพมหานคร","กระบี่","กาญจนบุรี","กาฬสินธุ์","กำแพงเพชร","ขอนแก่น","จันทบุรี","ฉะเชิงเทรา","ชลบุรี","ชัยนาท","ชัยภูมิ","ชุมพร","เชียงราย","เชียงใหม่","ตรัง","ตราด","ตาก","นครนายก","นครปฐม","นครพนม","นครราชสีมา","นครศรีธรรมราช","นครสวรรค์","นนทบุรี","นราธิวาส","น่าน","บึงกาฬ","บุรีรัมย์","ปทุมธานี","ประจวบคีรีขันธ์","ปราจีนบุรี","ปัตตานี","พระนครศรีอยุธยา","พะเยา","พังงา","พัทลุง","พิจิตร","พิษณุโลก","เพชรบุรี","เพชรบูรณ์","แพร่","ภูเก็ต","มหาสารคาม","มุกดาหาร","แม่ฮ่องสอน","ยโสธร","ยะลา","ร้อยเอ็ด","ระนอง","ระยอง","ราชบุรี","ลพบุรี","ลำปาง","ลำพูน","เลย","ศรีสะเกษ","สกลนคร","สงขลา","สตูล","สมุทรปราการ","สมุทรสงคราม","สมุทรสาคร","สระแก้ว","สระบุรี","สิงห์บุรี","สุโขทัย","สุพรรณบุรี","สุราษฎร์ธานี","สุรินทร์","หนองคาย","หนองบัวลำภู","อ่างทอง","อำนาจเจริญ","อุดรธานี","อุตรดิตถ์","อุทัยธานี","อุบลราชธานี"];

    function parseCSVText(text){
      const rows=[]; let row=[], cur='', q=false;
      for(let i=0;i<text.length;i++){ const c=text[i];
        if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
        else { if(c==='"')q=true; else if(c===','){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(c==='\r'){} else cur+=c; } }
      if(cur!==''||row.length){row.push(cur);rows.push(row);}
      return rows.filter(r=>r.some(x=>(x||'').trim()!==''));
    }

    /* ===================== PRODUCTS (SKU) ===================== */
    function ProductsView() {
      const emptyForm = () => ({ id:"", name:"", description:"", price:"", label:"", product_type:"", packs:"1", image:"", enabled:true });
      const [products, setProducts] = useState([]);
      const [form, setForm] = useState(emptyForm());
      const [busy, setBusy] = useState(false);
      const [flash, setFlash] = useState("");
      const [addingType, setAddingType] = useState(false);
      const types = Store.types();
      const [cfg, setCfg] = useState(Store.imageConfig());
      const [showCfg, setShowCfg] = useState(false);
      const [uploadingId, setUploadingId] = useState(null);
      const cloudReady = !!(cfg.cloud && cfg.preset);
      const set = (k,v) => setForm(f => ({ ...f, [k]:v }));
      const refresh = () => setProducts(Store.all());

      useEffect(() => { Store.init().then(r => { if (!r.ok) setFlash("⚠️ เชื่อม Supabase ไม่ได้ ใช้ข้อมูลสำรองชั่วคราว"); refresh(); }); }, []);

      function saveCfg(){ Store.setImageConfig({ cloud:(cfg.cloud||"").trim(), preset:(cfg.preset||"").trim() }); setFlash("บันทึกการตั้งค่าที่เก็บรูปแล้ว ✓"); setTimeout(()=>setFlash(""),2500); }
      const moveUp = async (id) => { try { await Store.move(id,-1); refresh(); } catch(e){ alert(e.message); } };
      const moveDown = async (id) => { try { await Store.move(id,+1); refresh(); } catch(e){ alert(e.message); } };
      async function changeImage(p, file){ if(!file) return; setUploadingId(p.id);
        try { const url = cloudReady ? await uploadToCloudinary(file,cfg) : await fileToScaledDataURL(file,640); await Store.upsert(Object.assign({},p,{image:url})); refresh(); }
        catch(e){ alert("อัปโหลดรูปไม่สำเร็จ: " + (e&&e.message?e.message:e)); } finally { setUploadingId(null); } }
      async function onImage(file){ if(!file) return; setBusy(true);
        try { set("image", cloudReady ? await uploadToCloudinary(file,cfg) : await fileToScaledDataURL(file,640)); }
        catch(e){ alert("อัปโหลดรูปไม่สำเร็จ: " + (e&&e.message?e.message:e)); } finally { setBusy(false); } }
      async function save(){
        if(!form.name.trim()) return setFlash("กรุณากรอกชื่อสินค้า");
        if(form.price===""||isNaN(Number(form.price))) return setFlash("กรุณากรอกราคาเป็นตัวเลข");
        const isEdit = !!form.id;
        const p = { ...form, name:form.name.trim(), description:form.description.trim(), price:Number(form.price) };
        setBusy(true);
        try { await Store.upsert(p); setForm(emptyForm()); setAddingType(false); refresh(); setFlash(isEdit?"อัปเดตสินค้าแล้ว ✓":"เพิ่มสินค้าแล้ว ✓"); setTimeout(()=>setFlash(""),2500); }
        catch(e){ setFlash("บันทึกไม่สำเร็จ: " + (e&&e.message?e.message:e)); } finally { setBusy(false); }
      }
      function edit(p){ setForm({ ...p, price:String(p.price), packs:String(p.packs||1) }); setAddingType(false); window.scrollTo({top:0,behavior:"smooth"}); }
      async function toggle(id){ try { await Store.toggle(id); refresh(); } catch(e){ alert(e.message); } }
      async function remove(id){ if(confirm("ลบสินค้านี้?")){ try { await Store.remove(id); refresh(); } catch(e){ alert(e.message); } } }

      return (
        <div>
          <h1 className="mb-4 text-xl font-extrabold">จัดการสินค้า (SKU)</h1>

          <section className="card mb-4">
            <button className="flex w-full items-center justify-between" onClick={()=>setShowCfg(s=>!s)}>
              <span className="font-bold">⚙️ ที่เก็บรูปภาพ (Cloudinary)</span>
              <span className={"rounded-full px-2.5 py-0.5 text-xs font-semibold " + (cloudReady?"bg-emerald-100 text-emerald-700":"bg-amber-100 text-amber-700")}>{cloudReady?"● เชื่อมแล้ว":"○ ยังไม่ตั้งค่า"}</span>
            </button>
            {showCfg && (
              <div className="mt-3 space-y-2">
                <p className="text-xs text-gray-400">สมัครฟรีที่ <a href="https://cloudinary.com/users/register_free" target="_blank" rel="noopener" className="font-semibold text-sixty-blued underline">cloudinary.com</a> → Settings → Upload → Add upload preset (Unsigned) → กรอก Cloud name + preset</p>
                <div className="grid grid-cols-2 gap-2">
                  <div><label className="label">Cloud name</label><input className="field" value={cfg.cloud||""} onChange={e=>setCfg({...cfg,cloud:e.target.value})} /></div>
                  <div><label className="label">Upload preset</label><input className="field" value={cfg.preset||""} onChange={e=>setCfg({...cfg,preset:e.target.value})} /></div>
                </div>
                <button className="btn-grad px-5 py-2" onClick={saveCfg}>บันทึกการตั้งค่า</button>
              </div>
            )}
          </section>

          <section className="card mb-6">
            <h2 className="mb-4 font-bold">{form.id ? "แก้ไขสินค้า" : "เพิ่มสินค้าใหม่"}</h2>
            <div className="grid gap-4 sm:grid-cols-[140px_1fr]">
              <div>
                <label className="label">รูปสินค้า</label>
                <label className="flex aspect-square w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl border-2 border-dashed border-gray-300 bg-gray-50 text-center text-xs text-gray-400 hover:border-sixty-blue">
                  {busy ? <span className="text-sixty-blued">กำลังอัปโหลด…</span> : form.image ? <img src={form.image} alt="" className="h-full w-full object-cover" /> : <span>แตะเพื่อ<br/>อัปโหลดรูป</span>}
                  <input type="file" accept="image/*" className="hidden" onChange={e=>onImage(e.target.files[0])} />
                </label>
                {form.image && <button className="mt-1 text-xs text-sixty-pink" onClick={()=>set("image","")}>ลบรูป</button>}
              </div>
              <div className="space-y-3">
                <div><label className="label">ชื่อสินค้า *</label><input className="field" value={form.name} onChange={e=>set("name",e.target.value)} placeholder="เช่น 6ty° แพ็ก 6 ขวด" /></div>
                <div><label className="label">รายละเอียดสินค้า</label><textarea className="field" rows={2} value={form.description} onChange={e=>set("description",e.target.value)} /></div>
                <div className="grid grid-cols-2 gap-3">
                  <div><label className="label">ราคา (บาท) *</label><input className="field" inputMode="numeric" value={form.price} onChange={e=>set("price",e.target.value.replace(/[^\d.]/g,""))} placeholder="90" /></div>
                  <div><label className="label">ป้าย (label)</label>
                    <select className="field" value={form.label} onChange={e=>set("label",e.target.value)}>
                      {Store.LABELS.map(l => <option key={l||"none"} value={l}>{l||"— ไม่มีป้าย —"}</option>)}
                    </select>
                  </div>
                </div>
                <div><label className="label">จำนวนแพ็คที่ได้เมื่อซื้อ 1 ชิ้น <span className="font-normal text-gray-400">(แพ็ค/ชิ้น)</span></label>
                  <input className="field" inputMode="numeric" value={form.packs} onChange={e=>set("packs",e.target.value.replace(/\D/g,""))} placeholder="เช่น 38" /></div>
                <div>
                  <label className="label">ประเภทสินค้า (product_type)</label>
                  {!addingType ? (
                    <select className="field" value={form.product_type} onChange={e=>{ if(e.target.value==="__new__"){ setAddingType(true); set("product_type",""); } else set("product_type",e.target.value); }}>
                      <option value="">— เลือกประเภท —</option>
                      {types.map(t => <option key={t} value={t}>{t}</option>)}
                      <option value="__new__">＋ เพิ่มประเภทใหม่…</option>
                    </select>
                  ) : (
                    <div className="flex gap-2">
                      <input className="field" autoFocus placeholder="พิมพ์ประเภทใหม่ เช่น 750" value={form.product_type} onChange={e=>set("product_type",e.target.value)} />
                      <button className="shrink-0 rounded-xl border-2 border-gray-200 px-3 font-semibold text-gray-500" onClick={()=>setAddingType(false)}>เสร็จ</button>
                    </div>
                  )}
                </div>
                <label className="flex items-center gap-2 pt-1"><input type="checkbox" className="h-5 w-5 accent-sixty-pink" checked={form.enabled} onChange={e=>set("enabled",e.target.checked)} /><span className="text-sm font-semibold">แสดงสินค้านี้บนหน้าร้าน</span></label>
              </div>
            </div>
            {flash && <p className="mt-3 text-sm font-medium text-sixty-blued">{flash}</p>}
            <div className="mt-4 flex gap-2">
              <button className="btn-grad px-6 py-2.5" onClick={save} disabled={busy}>{busy?"กำลังบันทึก…":(form.id?"บันทึกการแก้ไข":"เพิ่มสินค้า")}</button>
              {form.id && <button className="rounded-xl border-2 border-gray-200 px-5 py-2.5 font-semibold text-gray-500" onClick={()=>{setForm(emptyForm());setAddingType(false);}}>ยกเลิก</button>}
            </div>
          </section>

          <h2 className="mb-1 font-bold">สินค้าทั้งหมด ({products.length})</h2>
          <p className="mb-3 text-xs text-gray-400">ลำดับการแสดงผลบนหน้าร้าน — กดปุ่ม ▲ / ▼ เพื่อเลื่อนขึ้น/ลง · แตะรูปเพื่อเปลี่ยนรูป</p>
          <div className="space-y-3">
            {products.map((p, idx) => (
              <div key={p.id} className="card flex items-center gap-3">
                <div className="flex shrink-0 flex-col items-center gap-1">
                  <span className="text-[11px] font-bold text-gray-300">#{idx+1}</span>
                  <button disabled={idx===0} onClick={()=>moveUp(p.id)} className="h-7 w-9 rounded-lg border-2 border-sixty-blue text-sm font-bold leading-none text-sixty-blued transition hover:bg-sixty-mist disabled:opacity-25">▲</button>
                  <button disabled={idx===products.length-1} onClick={()=>moveDown(p.id)} className="h-7 w-9 rounded-lg border-2 border-sixty-blue text-sm font-bold leading-none text-sixty-blued transition hover:bg-sixty-mist disabled:opacity-25">▼</button>
                </div>
                <label className="relative h-16 w-16 shrink-0 cursor-pointer overflow-hidden rounded-xl" title="แตะเพื่อเปลี่ยนรูป">
                  {uploadingId===p.id ? <div className="grad flex h-16 w-16 items-center justify-center rounded-xl text-[10px] font-bold text-white">อัปโหลด…</div>
                    : p.image ? <img src={p.image} alt="" className="h-16 w-16 rounded-xl object-cover" />
                    : <div className="grad flex h-16 w-16 items-center justify-center rounded-xl text-sm font-bold text-white">6ty°</div>}
                  <span className="absolute inset-x-0 bottom-0 bg-black/50 py-0.5 text-center text-[9px] font-semibold text-white">เปลี่ยนรูป</span>
                  <input type="file" accept="image/*" className="hidden" onChange={e=>changeImage(p,e.target.files[0])} />
                </label>
                <div className="min-w-0 flex-1">
                  <div className="flex flex-wrap items-center gap-2">
                    <p className="truncate font-bold">{p.name}</p>
                    {p.label && <span className="grad rounded-full px-2 py-0.5 text-[11px] font-semibold text-white">{p.label}</span>}
                    {p.product_type && <span className="rounded-full bg-sixty-mist px-2 py-0.5 text-[11px] font-semibold text-sixty-blued">ประเภท {p.product_type}</span>}
                    {p.packs>1 && <span className="rounded-full bg-gray-100 px-2 py-0.5 text-[11px] font-semibold text-gray-500">{p.packs} แพ็ค/ชิ้น</span>}
                  </div>
                  {p.description && <p className="truncate text-xs text-gray-400">{p.description}</p>}
                  <p className="text-sm font-semibold grad-text">{baht(p.price)}</p>
                </div>
                <div className="flex shrink-0 flex-col items-end gap-1.5">
                  <StatusPill on={p.enabled} onText="● แสดงอยู่" offText="○ ซ่อนอยู่" onClick={()=>toggle(p.id)} />
                  <div className="flex gap-2 text-xs">
                    <button className="font-semibold text-sixty-blued" onClick={()=>edit(p)}>แก้ไข</button>
                    <button className="font-semibold text-sixty-pink" onClick={()=>remove(p.id)}>ลบ</button>
                  </div>
                </div>
              </div>
            ))}
            {products.length===0 && <p className="text-center text-sm text-gray-400">ยังไม่มีสินค้า</p>}
          </div>
        </div>
      );
    }

    /* ===================== ORDERS ===================== */
    function OrdersView() {
      const [rows, setRows] = useState(null);
      const [err, setErr] = useState("");
      const [flash, setFlash] = useState("");
      const refresh = () => Store.ordersList().then(setRows).catch(e=>{ setErr(e.message); setRows([]); });
      const [cron, setCron] = useState(null);
      const [showCron, setShowCron] = useState(false);
      const [cronFlash, setCronFlash] = useState("");
      useEffect(() => { refresh(); Store.cronGet().then(setCron).catch(()=>setCron({})); }, []);
      const setC = (k,v) => setCron(c => ({ ...c, [k]:v }));
      async function saveCron(){ try { await Store.cronSave(cron); setCronFlash("บันทึกการตั้งค่า cronjob แล้ว ✓"); setTimeout(()=>setCronFlash(""),3000); } catch(e){ alert(e.message); } }
      const itemsText = (items) => Array.isArray(items) ? items.map(i => (i.name||i.sku_code||"สินค้า") + " ×" + (i.qty||1)).join(", ") : "";
      const PAY = ["Pending","Paid","Cancelled"];
      async function changePay(o, val){
        try { await Store.orderUpdate(o.order_id, { payment_status: val }); refresh();
          setFlash(val==="Paid" ? ("✓ "+o.order_id+" → Paid (ระบบจริงจะยิง LINE flex + อีเมลยืนยันการชำระให้ลูกค้า)") : ("อัปเดต "+o.order_id+" → "+val));
          setTimeout(()=>setFlash(""),4500);
        } catch(e){ alert(e.message); }
      }
      function exportPaid(){
        const paid = (rows||[]).filter(o=>o.payment_status==="Paid");
        const head = ["order_id","created_at","customer","phone","amount","payment_status","items","address","province","postal_code"];
        const esc = (v)=> '"'+String(v==null?"":v).replace(/"/g,'""')+'"';
        const lines = [head.join(",")].concat(paid.map(o => [o.order_id,o.created_at,o.customer,o.phone,o.amount,o.payment_status,itemsText(o.items),o.address,o.province,o.postal_code].map(esc).join(",")));
        const blob = new Blob(["﻿"+lines.join("\n")], { type:"text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="orders_paid_"+new Date().toISOString().slice(0,10)+".csv"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      }
      return (
        <div>
          <div className="mb-4 flex flex-wrap items-center justify-between gap-2">

    /* ===================== DC ===================== */
    function DCView() {
      const empty = () => ({ dc_id:"", dc_name:"", province:"", status:"active" });
      const [rows, setRows] = useState([]);
      const [form, setForm] = useState(empty());
      const [flash, setFlash] = useState("");
      const [importing, setImporting] = useState(false);
      const [editId, setEditId] = useState(null);
      const [editRow, setEditRow] = useState(null);
      const refresh = () => Store.dcList().then(setRows).catch(e=>setFlash(e.message));
      useEffect(() => { refresh(); }, []);
      const set = (k,v) => setForm(f => ({ ...f, [k]:v }));
      const setE = (k,v) => setEditRow(r => ({ ...r, [k]:v }));
      const cell = "w-full rounded-lg border border-gray-300 px-2 py-1 text-sm focus:border-sixty-blue focus:outline-none";

      function nextDcId(list){
        let max = 0;
        (list||rows).forEach(d => { const m = /^DC-(\d+)$/.exec(d.dc_id||""); if(m){ const n=parseInt(m[1],10); if(n>max) max=n; } });
        return "DC-" + String(max+1).padStart(4,"0");
      }
      const previewId = nextDcId();

      async function add(){
        if(!form.dc_name.trim()) return setFlash("กรุณากรอกชื่อ DC");
        const id = nextDcId();
        try { await Store.dcUpsert({ dc_id:id, dc_name:form.dc_name.trim(), province:form.province, status:form.status });
          setForm(empty()); refresh(); setFlash("เพิ่ม DC แล้ว ✓ ("+id+")"); setTimeout(()=>setFlash(""),3000); }
        catch(e){ setFlash("บันทึกไม่สำเร็จ: " + e.message); }
      }
      function startEdit(d){ setEditId(d.dc_id); setEditRow({ ...d }); }
      function cancelEdit(){ setEditId(null); setEditRow(null); }
      async function saveEdit(){ if(!editRow.dc_name.trim()) return alert("กรุณากรอกชื่อ DC"); try { await Store.dcUpsert(editRow); cancelEdit(); refresh(); } catch(e){ alert(e.message); } }
      async function toggle(d){ try { await Store.dcToggle(d.dc_id, d.status); refresh(); } catch(e){ alert(e.message); } }
      async function remove(id){ if(confirm("ลบ DC นี้?")){ try { await Store.dcRemove(id); refresh(); } catch(e){ alert(e.message); } } }

      function downloadTemplate(){
        const csv = "dc_name,province,status\nคลังกรุงเทพ,กรุงเทพมหานคร,active\nคลังเชียงใหม่,เชียงใหม่,active\n";
        const blob = new Blob(["﻿"+csv], { type:"text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href=url; a.download="dc_import_template.csv"; document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      }
      async function onImport(file){
        if(!file) return; setImporting(true); setFlash("");
        try {
          const text = await file.text();
          const csv = parseCSVText(text);
          if(csv.length < 2){ setFlash("ไฟล์ไม่มีข้อมูล (ต้องมีหัวตาราง + อย่างน้อย 1 แถว)"); setImporting(false); return; }
          const head = csv[0].map(h=>(h||"").trim().toLowerCase());
          const iName=head.indexOf("dc_name"), iProv=head.indexOf("province"), iStat=head.indexOf("status");
          if(iName<0){ setFlash("ไม่พบคอลัมน์ dc_name ในไฟล์ — โหลด template เพื่อดูรูปแบบ"); setImporting(false); return; }
          let current = await Store.dcList(); let added=0;
          for(let r=1;r<csv.length;r++){
            const c = csv[r]; const name=(c[iName]||"").trim(); if(!name) continue;
            const id = nextDcId(current);
            const rec = { dc_id:id, dc_name:name, province: iProv>=0?(c[iProv]||"").trim():"", status: (iStat>=0 && (c[iStat]||"").trim()) || "active" };
            await Store.dcUpsert(rec); current = current.concat([rec]); added++;
          }
          refresh(); setFlash("นำเข้าสำเร็จ "+added+" รายการ ✓"); setTimeout(()=>setFlash(""),4000);
        } catch(e){ setFlash("นำเข้าไม่สำเร็จ: " + (e&&e.message?e.message:e)); }
        finally { setImporting(false); }
      }

      return (
        <div>
          <div className="mb-4 flex flex-wrap items-center justify-between gap-2">
            <h1 className="text-xl font-extrabold">Distribution Centers (DC)</h1>
            <div className="flex gap-2">
              <button onClick={downloadTemplate} className="rounded-xl border-2 border-gray-200 px-3 py-2 text-sm font-semibold text-gray-600 hover:bg-gray-50">⬇ Template</button>
              <label className="btn-grad cursor-pointer px-4 py-2 text-sm">
                {importing ? "กำลังนำเข้า…" : "⬆ นำเข้าไฟล์ CSV"}
                <input type="file" accept=".csv,text/csv" className="hidden" disabled={importing} onChange={e=>{ onImport(e.target.files[0]); e.target.value=""; }} />
              </label>
            </div>
          </div>
          <section className="card mb-6">
            <h2 className="mb-3 font-bold">เพิ่ม DC ใหม่</h2>
            <div className="grid gap-3 sm:grid-cols-2">
              <div><label className="label">DC ID <span className="font-normal text-gray-400">(สร้างอัตโนมัติ)</span></label><input className="field bg-gray-100 text-gray-500" value={previewId} disabled readOnly /></div>
              <div><label className="label">DC Name *</label><input className="field" value={form.dc_name} onChange={e=>set("dc_name",e.target.value)} placeholder="เช่น คลังกรุงเทพ" /></div>
              <div><label className="label">Province</label>
                <select className="field" value={form.province} onChange={e=>set("province",e.target.value)}>
                  <option value="">— เลือกจังหวัด —</option>
                  {PROVINCES.map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div><label className="label">Status</label>
                <select className="field" value={form.status} onChange={e=>set("status",e.target.value)}>
                  <option value="active">active (เปิด)</option>
                  <option value="inactive">inactive (ปิด)</option>
                </select>
              </div>
            </div>
            {flash && <p className="mt-3 text-sm font-medium text-sixty-blued">{flash}</p>}
            <div className="mt-4">
              <button className="btn-grad px-6 py-2.5" onClick={add}>เพิ่ม DC</button>
            </div>
          </section>
          <h2 className="mb-3 font-bold">DC ทั้งหมด ({rows.length})</h2>
          <div className="overflow-x-auto rounded-2xl border border-gray-200 bg-white shadow-sm">
            <table className="w-full min-w-[640px] text-sm">
              <thead className="bg-gray-50 text-left text-xs text-gray-500">
                <tr>
                  <th className="px-3 py-2 font-semibold">DC ID</th>
                  <th className="px-3 py-2 font-semibold">DC Name</th>
                  <th className="px-3 py-2 font-semibold">Province</th>
                  <th className="px-3 py-2 font-semibold">Status</th>
                  <th className="px-3 py-2 text-right font-semibold">จัดการ</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(d => editId===d.dc_id ? (
                  <tr key={d.dc_id} className="border-t border-gray-100 bg-sixty-mist/40">
                    <td className="px-3 py-2 font-mono text-xs text-gray-400">{d.dc_id}</td>
                    <td className="px-2 py-1"><input className={cell} value={editRow.dc_name} onChange={e=>setE("dc_name",e.target.value)} /></td>
                    <td className="px-2 py-1"><select className={cell} value={editRow.province} onChange={e=>setE("province",e.target.value)}><option value="">—</option>{PROVINCES.map(p=> <option key={p} value={p}>{p}</option>)}</select></td>
                    <td className="px-2 py-1"><select className={cell} value={editRow.status} onChange={e=>setE("status",e.target.value)}><option value="active">active</option><option value="inactive">inactive</option></select></td>
                    <td className="whitespace-nowrap px-3 py-2 text-right">
                      <button className="btn-grad px-3 py-1 text-xs" onClick={saveEdit}>บันทึก</button>
                      <button className="ml-2 rounded-lg border-2 border-gray-200 px-3 py-1 text-xs font-semibold text-gray-500" onClick={cancelEdit}>ยกเลิก</button>
                    </td>
                  </tr>
                ) : (
                  <tr key={d.dc_id} className="border-t border-gray-100 hover:bg-gray-50">
                    <td className="px-3 py-2 font-mono text-xs text-gray-400">{d.dc_id}</td>
                    <td className="px-3 py-2 font-medium">{d.dc_name}</td>
                    <td className="px-3 py-2">{d.province || "-"}</td>
                    <td className="px-3 py-2"><button onClick={()=>toggle(d)} className={"rounded-full px-2.5 py-0.5 text-xs font-semibold " + (d.status==="active"?"bg-emerald-100 text-emerald-700":"bg-gray-200 text-gray-500")}>{d.status==="active"?"● active":"○ inactive"}</button></td>
                    <td className="whitespace-nowrap px-3 py-2 text-right">
                      <button className="font-semibold text-sixty-blued" onClick={()=>startEdit(d)}>แก้ไข</button>
                      <button className="ml-3 font-semibold text-sixty-pink" onClick={()=>remove(d.dc_id)}>ลบ</button>
                    </td>
                  </tr>
                ))}
                {rows.length===0 && <tr><td colSpan={5} className="px-3 py-6 text-center text-sm text-gray-400">ยังไม่มี DC</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

                  <tr key={b.branch_id} className="border-t border-gray-100 bg-sixty-mist/40 align-middle">
                    <td className="px-3 py-2 font-mono text-xs text-gray-400">{b.branch_id}</td>
                    <td className="px-2 py-1"><input className={cell} value={editRow.branch_code} onChange={e=>setE("branch_code",e.target.value)} /></td>
                    <td className="px-2 py-1"><input className={cell} value={editRow.branch_name} onChange={e=>setE("branch_name",e.target.value)} /></td>
                    <td className="px-2 py-1"><select className={cell} value={editRow.province} onChange={e=>setE("province",e.target.value)}><option value="">—</option>{PROVINCES.map(p=> <option key={p} value={p}>{p}</option>)}</select></td>
                    <td className="px-2 py-1"><input className={cell} value={editRow.affiliation} onChange={e=>setE("affiliation",e.target.value)} /></td>
                    <td className="px-2 py-1"><select className={cell} value={editRow.hub} onChange={e=>setE("hub",e.target.value)}><option value="">—</option>{hubOptions.map(h=> <option key={h} value={h}>{h}</option>)}</select></td>
                    <td className="px-2 py-1"><select className={cell} value={editRow.active?"yes":"no"} onChange={e=>setE("active",e.target.value==="yes")}><option value="yes">active</option><option value="no">inactive</option></select></td>
                    <td className="whitespace-nowrap px-3 py-2 text-right">
                      <button className="btn-grad px-3 py-1 text-xs" onClick={saveEdit}>บันทึก</button>
                      <button className="ml-2 rounded-lg border-2 border-gray-200 px-3 py-1 text-xs font-semibold text-gray-500" onClick={cancelEdit}>ยกเลิก</button>
                    </td>
                  </tr>
                ) : (
                  <tr key={b.branch_id} className="border-t border-gray-100 align-middle hover:bg-gray-50">
                    <td className="px-3 py-2 font-mono text-xs text-gray-400">{b.branch_id}</td>
                    <td className="px-3 py-2">{b.branch_code}</td>
                    <td className="px-3 py-2 font-medium">{b.branch_name}</td>
                    <td className="px-3 py-2">{b.province}</td>
                    <td className="px-3 py-2">{b.affiliation}</td>
                    <td className="px-3 py-2">{b.hub}</td>
                    <td className="px-3 py-2"><button onClick={()=>toggle(b)} className={"rounded-full px-2.5 py-0.5 text-xs font-semibold " + (b.active?"bg-emerald-100 text-emerald-700":"bg-gray-200 text-gray-500")}>{b.active?"● active":"○ inactive"}</button></td>
                    <td className="whitespace-nowrap px-3 py-2 text-right">
                      <button className="font-semibold text-sixty-blued" onClick={()=>startEdit(b)}>แก้ไข</button>
                      <button className="ml-3 font-semibold text-sixty-pink" onClick={()=>remove(b.branch_id)}>ลบ</button>
                    </td>
                  </tr>
                ))}
                {filtered.length===0 && <tr><td colSpan={8} className="px-3 py-6 text-center text-sm text-gray-400">ไม่พบสาขา</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    /* ===================== RIDER STATUS ===================== */
    function RiderStatusView() {
      const [rows, setRows] = useState(null);
      const [flash, setFlash] = useState("");
      const [importing, setImporting] = useState(false);
      const refresh = () => Store.riderList().then(setRows).catch(e=>{ setFlash(e.message); setRows([]); });
      useEffect(() => { refresh(); }, []);
      function downloadTemplate(){
        const csv = "order_id,rider_status,date_send,job_id\n20260331-111237-6,In Transit,2026-03-31,JOB001\n20260331-111240-2,Delivered,2026-03-31,JOB002\n";
        const blob = new Blob(["﻿"+csv], { type:"text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="rider_status_template.csv"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      }
      async function onImport(file){
        if(!file) return; setImporting(true); setFlash("");
        try {
          const csv = parseCSVText(await file.text());
          if(csv.length<2){ setFlash("ไฟล์ไม่มีข้อมูล"); setImporting(false); return; }
          const head = csv[0].map(h=>(h||"").trim().toLowerCase());
          const iId=head.indexOf("order_id"), iSt=head.findIndex(h=>h==="rider_status"||h==="rider status"), iDs=head.findIndex(h=>h==="date_send"||h==="date send"), iJob=head.indexOf("job_id");
          if(iId<0||iSt<0){ setFlash("ไม่พบคอลัมน์ order_id / rider_status — โหลด template เพื่อดูรูปแบบ"); setImporting(false); return; }
          const recs = csv.slice(1).map(c=>({ order_id:(c[iId]||"").trim(), rider_status:(c[iSt]||"").trim(), date_send: iDs>=0?(c[iDs]||"").trim():"", job_id: iJob>=0?(c[iJob]||"").trim():"" })).filter(r=>r.order_id);
          const res = await Store.riderImport(recs);
          refresh();
          const delivered = recs.filter(r=>(r.rider_status||"").toLowerCase()==="delivered").length;
          setFlash("นำเข้า "+res.imported+" รายการ · จับคู่+อัปเดตออเดอร์ "+res.mappedUpdates+" รายการ"+(delivered?(" · Delivered "+delivered+" (ระบบจริงจะยิง LINE+อีเมลให้ลูกค้า)"):""));
          setTimeout(()=>setFlash(""),6000);
        } catch(e){ setFlash("นำเข้าไม่สำเร็จ: " + (e&&e.message?e.message:e)); }
        finally { setImporting(false); }
      }
      return (
        <div>
          <div className="mb-2 flex flex-wrap items-center justify-between gap-2">
            <h1 className="text-xl font-extrabold">Rider Status</h1>
            <div className="flex gap-2">
              <button onClick={downloadTemplate} className="rounded-xl border-2 border-gray-200 px-3 py-2 text-sm font-semibold text-gray-600 hover:bg-gray-50">⬇ Template</button>
              <label className="btn-grad cursor-pointer px-4 py-2 text-sm">{importing?"กำลังนำเข้า…":"⬆ อัปโหลดไฟล์ (CSV)"}<input type="file" accept=".csv,text/csv" className="hidden" disabled={importing} onChange={e=>{ onImport(e.target.files[0]); e.target.value=""; }} /></label>
            </div>
          </div>
          <p className="mb-4 text-xs text-gray-400">ไฟล์จากไปรษณีย์: order_id ไม่มี prefix (เช่น 20260331-111237-6) ระบบจะเติม <b>ORD-</b> แล้วจับคู่กับออเดอร์ + อัปเดต Rider Status ให้อัตโนมัติ</p>
          {flash && <p className="mb-3 rounded-xl bg-sixty-mist px-4 py-2 text-sm font-medium text-sixty-blued">{flash}</p>}

          <section className="card mb-4">
            <button className="flex w-full items-center justify-between" onClick={()=>setShowCron(s=>!s)}>
              <span className="font-bold">⏰ Cronjob — ส่งรายงานอัตโนมัติทางอีเมล</span>
              <span className={"rounded-full px-2.5 py-0.5 text-xs font-semibold " + (cron&&cron.enabled?"bg-emerald-100 text-emerald-700":"bg-gray-200 text-gray-500")}>{cron&&cron.enabled?"● เปิด":"○ ปิด"}</span>
            </button>
            {showCron && cron && (
              <div className="mt-4">
                <div className="grid gap-3 sm:grid-cols-2">
                  <div><label className="label">ชนิดไฟล์ที่ส่ง</label>
                    <select className="field" value={cron.file_type||"csv"} onChange={e=>setC("file_type",e.target.value)}>
                      <option value="csv">CSV (.csv)</option>
                      <option value="xlsx">Excel (.xlsx)</option>
                    </select>
                  </div>
                  <div><label className="label">กวาดสถานะ (Payment Status)</label>
                    <select className="field" value={cron.status_filter||"Paid"} onChange={e=>setC("status_filter",e.target.value)}>
                      <option value="Paid">Paid</option>
                      <option value="Pending">Pending</option>
                      <option value="Cancelled">Cancelled</option>
                      <option value="All">ทั้งหมด (All)</option>
                    </select>
                  </div>
                  <div><label className="label">เริ่มกวาดสถานะเวลา</label><input type="time" className="field" value={cron.sweep_time||"09:00"} onChange={e=>setC("sweep_time",e.target.value)} /></div>
                  <div><label className="label">ส่งรายงานเวลา</label><input type="time" className="field" value={cron.send_time||"09:00"} onChange={e=>setC("send_time",e.target.value)} /></div>
                </div>
                <div className="mt-3">
                  <label className="label">ช่องทางการส่ง</label>
                  <div className="space-y-2">
                    <div className="flex flex-wrap items-center gap-2">
                      <label className="flex items-center gap-2"><input type="checkbox" className="h-4 w-4 accent-sixty-pink" checked={!!cron.channel_email} onChange={e=>setC("channel_email",e.target.checked)} /><span className="text-sm font-semibold">อีเมล →</span></label>
                      <input className="field max-w-xs" value={cron.email_to||""} onChange={e=>setC("email_to",e.target.value)} placeholder="surasit@transformational.com" />
                    </div>
                    <label className="flex items-center gap-2"><input type="checkbox" className="h-4 w-4 accent-sixty-pink" checked={!!cron.channel_line} onChange={e=>setC("channel_line",e.target.checked)} /><span className="text-sm font-semibold">LINE <span className="font-normal text-gray-400">(ต้องตั้ง LINE token ใน Apps Script)</span></span></label>
                  </div>
                </div>
                <label className="mt-3 flex items-center gap-2"><input type="checkbox" className="h-5 w-5 accent-sixty-pink" checked={!!cron.enabled} onChange={e=>setC("enabled",e.target.checked)} /><span className="text-sm font-semibold">เปิดใช้งาน cronjob</span></label>
                {cronFlash && <p className="mt-2 text-sm font-medium text-sixty-blued">{cronFlash}</p>}
                <div className="mt-3"><button className="btn-grad px-6 py-2.5" onClick={saveCron}>บันทึกการตั้งค่า</button></div>
                <p className="mt-3 rounded-xl bg-amber-50 px-3 py-2 text-xs text-amber-700">⚙️ ค่านี้เก็บใน Supabase — ตัวที่ "รันจริง" คือ Google Apps Script <b>CronReport.gs</b> (แนบให้แล้ว) ติดตั้งในโปรเจกต์ Apps Script + ตั้ง time-driven trigger ให้รันตามเวลา แล้วมันจะอ่าน config นี้ → สร้างไฟล์ → อีเมลให้อัตโนมัติ</p>
              </div>
            )}
          </section>

          {rows===null && <p className="text-gray-400">กำลังโหลด…</p>}
          {rows && rows.length===0 && <p className="card text-center text-sm text-gray-400">ยังไม่มีข้อมูล Rider Status — อัปโหลดไฟล์จากไปรษณีย์</p>}
          {rows && rows.length>0 && (
            <div className="overflow-x-auto rounded-2xl border border-gray-200 bg-white shadow-sm">
              <table className="w-full min-w-[760px] text-sm">
                <thead className="bg-gray-50 text-left text-xs text-gray-500">
                  <tr>
                    <th className="px-3 py-2 font-semibold">Order ID (Rider)</th>
                    <th className="px-3 py-2 font-semibold">Mapped (ORD-)</th>
                    <th className="px-3 py-2 font-semibold">Rider Status</th>
                    <th className="px-3 py-2 font-semibold">Date Send</th>
                    <th className="px-3 py-2 font-semibold">Job ID</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map(r => (
                    <tr key={r.order_id} className="border-t border-gray-100 hover:bg-gray-50">
                      <td className="px-3 py-2 font-mono text-xs">{r.order_id}</td>
                      <td className="px-3 py-2 font-mono text-xs text-gray-400">{r.matched_order_id}</td>
                      <td className="px-3 py-2"><span className={"font-semibold " + ((r.rider_status||"").toLowerCase()==="delivered"?"text-emerald-600":"text-gray-700")}>{r.rider_status}</span></td>
                      <td className="px-3 py-2 text-gray-500">{r.date_send}</td>
                      <td className="px-3 py-2 text-gray-400">{r.job_id}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    /* ===================== APP (layout + sidebar) ===================== */
    function App() {
      const [view, setView] = useState("products");
      const NAV = [["products","สินค้า (SKU)","🧴"],["orders","ออเดอร์","🧾"],["rider","Rider Status","🛵"],["branches","สาขา","🏤"],["dc","DC","🏢"],["customers","ลูกค้า","👤"]];
      return (
        <div className="min-h-screen">
          <header className="sticky top-0 z-30 border-b border-gray-100 bg-white/90 backdrop-blur">
            <div className="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-2.5">
              <div className="flex items-center gap-2.5">
                <Logo size={38} />
                <div className="leading-none">
                  <span className="text-lg font-extrabold"><span className="grad-text">6ty°</span> Admin</span>
                  <p className="mt-0.5 hidden text-[10px] font-semibold tracking-wide text-gray-400 sm:block">แดชบอร์ดจัดการร้าน</p>
                </div>
              </div>
              <a href="index.html" className="rounded-full border border-gray-200 px-3 py-1.5 text-xs font-semibold text-gray-500 transition hover:border-sixty-blue hover:text-sixty-blued">ดูหน้าร้าน →</a>
            </div>
          </header>
          <div className="mx-auto flex max-w-7xl flex-col md:flex-row">
            <nav className="flex gap-2 overflow-x-auto border-b border-gray-100 bg-white p-3 md:w-56 md:shrink-0 md:flex-col md:overflow-visible md:border-b-0 md:border-r md:p-4">
              {NAV.map(([key,label,icon]) => (
                <button key={key} onClick={()=>setView(key)}
                  className={"flex shrink-0 items-center gap-2 whitespace-nowrap rounded-xl px-4 py-2.5 text-sm font-semibold transition md:w-full " + (view===key ? "grad text-white shadow" : "text-gray-500 hover:bg-gray-100")}>
                  <span>{icon}</span>{label}
                </button>
              ))}
            </nav>
            <main className="min-w-0 flex-1 px-4 py-5 sm:px-6">
              {view==="products"  && <ProductsView />}
              {view==="orders"    && <OrdersView />}
              {view==="rider"     && <RiderStatusView />}
              {view==="branches"  && <BranchesView />}
              {view==="dc"        && <DCView />}
              {view==="customers" && <CustomersView />}
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    (function () {
      try {
        var out = Babel.transform(document.getElementById("app-src").textContent, { presets: [["react", { runtime: "classic" }]] }).code;
        new Function(out)();
      } catch (e) {
        document.getElementById("root").innerHTML = '<pre style="padding:16px;color:#EC0A8C;white-space:pre-wrap">โหลดหน้า admin ไม่สำเร็จ: ' + (e&&e.message?e.message:e) + '</pre>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
