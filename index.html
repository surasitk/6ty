<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>6ty° Sixty Degrees — สั่งซื้อน้ำแร่ (เดโม)</title>
  <meta name="description" content="สั่งซื้อน้ำแร่ธรรมชาติ 6ty° ส่งตรงถึงบ้านโดยบุรุษไปรษณีย์" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          sixty: {
            blue: "#0FB5E8",
            blued: "#0a90c4",
            pink: "#EC0A8C",
            ink: "#0e2a3b",
            mist: "#f2fbff",
          },
        },
        fontFamily: { sans: ["Sarabun", "system-ui", "sans-serif"] },
      } },
    };
  </script>
  <style>
    body { font-family: "Sarabun", system-ui, sans-serif; }
    .grad { background-image: linear-gradient(135deg, #0FB5E8 0%, #6f4fd8 55%, #EC0A8C 100%); }
    .grad-text {
      background-image: linear-gradient(120deg, #0FB5E8 0%, #EC0A8C 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .field { width:100%; border:1px solid #d7e3ea; border-radius:.85rem; padding:.75rem 1rem; outline:none; font-size:1rem; background:#fff; }
    .field:focus { border-color:#0FB5E8; box-shadow:0 0 0 3px rgba(15,181,232,.18); }
    .label { display:block; margin-bottom:.3rem; font-size:.875rem; font-weight:600; color:#33576b; }
    .card { border:1px solid #e7eef3; border-radius:1.1rem; background:#fff; padding:1rem; box-shadow:0 6px 20px -12px rgba(13,72,103,.25); }
    .btn-grad { background-image: linear-gradient(120deg,#0FB5E8,#EC0A8C); color:#fff; border-radius:.85rem; font-weight:700; box-shadow:0 8px 18px -8px rgba(236,10,140,.5); transition:.15s; }
    .btn-grad:hover { filter:brightness(1.05); }
    .btn-grad:active { transform:scale(.98); }
    .pagebg { background:
      radial-gradient(1200px 360px at 50% -120px, rgba(15,181,232,.16), transparent 60%),
      radial-gradient(900px 320px at 90% 0, rgba(236,10,140,.10), transparent 55%),
      #f7fbfd; }
  </style>
</head>
<body class="pagebg text-sixty-ink">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="store.js?v=13"></script>

  <!-- App source kept as text/plain so Babel does NOT auto-run it with the
       "automatic" JSX runtime (which emits `import` and breaks classic scripts). -->
  <script type="text/plain" id="app-src">
    const { useState, useMemo, useEffect } = React;
    const baht = (n) => "฿" + Number(n || 0).toLocaleString("th-TH");
    const STEPS = ["เลือกสินค้า", "ชำระเงิน & ยืนยัน"];

    // Products come from the shared Store (managed in admin.html), demo only.
    // Real Thailand address data (~7,400 tambons), lazy-loaded & cached from CDN.
    const GEO_URL = "https://cdn.jsdelivr.net/gh/thailand-geography-data/thailand-geography-json@1/src/geography.json";
    let GEO = null;
    async function loadGeo() {
      if (!GEO) GEO = await fetch(GEO_URL).then(r => r.json());
      return GEO;
    }
    async function lookupPostal(code) {
      const data = await loadGeo();
      return data
        .filter(r => String(r.postalCode) === String(code))
        .map(r => ({ subdistrict: r.subdistrictNameTh, district: r.districtNameTh, province: r.provinceNameTh }));
    }
    const checkPromo = (code) => {
      const c = (code||"").trim().toUpperCase();
      if (c === "DEMO50") return { valid:true, code:c, message:"ใช้โค้ดได้ (เดโม) ลดเหลือราคาพิเศษ", discount_price:79 };
      return { valid:false, code:c, message:"โค้ดไม่ถูกต้อง (เดโม: ลอง DEMO50)" };
    };

    function Bottle({ size=64 }) {
      return (
        <div className="grad flex items-center justify-center rounded-2xl text-white" style={{ width:size, height:size }}>
          <span className="font-extrabold leading-none" style={{ fontSize: size*0.34 }}>6ty<span className="align-super" style={{ fontSize: size*0.18 }}>°</span></span>
        </div>
      );
    }
    function QtyStepper({ qty, onChange }) {
      return (
        <div className="flex items-center gap-2">
          <button className="h-9 w-9 rounded-full border-2 border-sixty-blue text-lg font-bold text-sixty-blue disabled:opacity-30" onClick={() => onChange(qty-1)} disabled={qty<=0}>−</button>
          <span className="w-6 text-center font-bold">{qty}</span>
          <button className="btn-grad h-9 w-9 text-lg" onClick={() => onChange(qty+1)}>+</button>
        </div>
      );
    }
    function Chip({ active, onClick, children }) {
      return (
        <button onClick={onClick}
          className={"rounded-xl border-2 px-4 py-3 text-sm font-semibold transition " +
            (active ? "border-sixty-blue bg-sixty-mist text-sixty-blued" : "border-gray-200 bg-white text-gray-500")}>
          {children}
        </button>
      );
    }
    function ProductCard({ item, qty, onAdd, onChange, onImage }) {
      return (
        <div className={"group flex flex-col overflow-hidden rounded-2xl border bg-white shadow-sm transition hover:shadow-lg " + (qty>0 ? "border-sixty-blue ring-1 ring-sixty-blue/30" : "border-gray-100")}>
          <div className="relative aspect-square w-full overflow-hidden bg-sixty-mist">
            {item.image
              ? <img src={item.image} alt={item.name} onClick={onImage} className="h-full w-full cursor-zoom-in object-cover transition duration-300 group-hover:scale-105" />
              : <div className="grad flex h-full w-full items-center justify-center text-3xl font-extrabold text-white">6ty°</div>}
            {item.label && <span className="grad absolute left-2 top-2 rounded-full px-2 py-0.5 text-[11px] font-semibold text-white shadow">{item.label}</span>}
          </div>
          <div className="flex flex-1 flex-col p-3">
            <p className="line-clamp-2 text-sm font-bold leading-snug">{item.name}</p>
            {item.description && <p className="mt-0.5 line-clamp-1 text-xs text-gray-400">{item.description}</p>}
            {item.packs>1 && <p className="mt-1 text-[11px] font-semibold text-sixty-blued">📦 1 ชิ้น = {item.packs} แพ็ค</p>}
            <div className="mt-auto pt-3">
              <p className="text-base font-extrabold grad-text">{baht(item.price)}</p>
              <div className="mt-2">
                {qty>0
                  ? <div className="flex items-center justify-center rounded-xl bg-sixty-mist py-1"><QtyStepper qty={qty} onChange={onChange} /></div>
                  : <button onClick={onAdd} className="btn-grad w-full py-2 text-sm">เพิ่มลงตะกร้า</button>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PaymentBox({ settings, amount }) {
      const s = settings || {};
      return (
        <div className="card">
          <h3 className="mb-2 font-bold">ชำระเงิน</h3>
          <p className="text-sm text-gray-500">สแกน QR แล้วโอนยอด <b className="grad-text">{baht(amount)}</b></p>
          <div className="mt-3 flex flex-col items-center gap-2">
            {s.payment_qr_url
              ? <img src={s.payment_qr_url} alt="QR" className="h-56 w-56 rounded-xl border object-contain" />
              : <div className="flex h-56 w-56 items-center justify-center rounded-xl border-2 border-dashed border-gray-300 bg-gray-50 px-3 text-center text-xs text-gray-400">ยังไม่ได้ตั้ง QR<br/>(ตั้งที่ Admin → ออเดอร์ → ตั้งค่าชำระเงิน)</div>}
            <p className="text-sm font-semibold">{s.bank_name || "ธนาคารกสิกรไทย (KBank)"}</p>
            {s.bank_account && <p className="text-sm text-gray-600">เลขบัญชี <b className="text-sixty-ink">{s.bank_account}</b>{s.bank_holder ? " · "+s.bank_holder : ""}</p>}
          </div>
        </div>
      );
    }

    function SlipUploadBox({ order, onUploaded }) {
      const [busy, setBusy] = useState(false);
      const [url, setUrl] = useState(order.slip_url || "");
      async function up(file){ if(!file) return; setBusy(true); try { const u = await Store.uploadSlip(order.order_id, file); setUrl(u); onUploaded && onUploaded(u); } catch(e){ alert("อัปสลิปไม่สำเร็จ: " + (e&&e.message?e.message:e)); } finally { setBusy(false); } }
      return (
        <div className="card mt-4">
          {url ? (
            <p className="text-center text-sm font-semibold text-emerald-600">✓ แนบสลิปแล้ว — รอแอดมินยืนยันการชำระเงิน</p>
          ) : (
            <div className="text-center">
              <p className="font-bold">📎 อัปโหลดสลิปการโอนเงิน</p>
              <p className="mt-1 text-xs text-gray-400">อัปตอนนี้เลย หรือกลับมาอัปทีหลังก็ได้ — ออเดอร์ถูกบันทึกแล้ว ไม่หาย</p>
              <label className="btn-grad mt-3 inline-block cursor-pointer px-6 py-2.5">{busy?"กำลังอัป…":"เลือกไฟล์สลิป"}<input type="file" accept="image/*" className="hidden" disabled={busy} onChange={e=>up(e.target.files[0])} /></label>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [catalog, setCatalog] = useState([]);
      useEffect(() => { Store.init().then(() => setCatalog(Store.enabled())); }, []);
      const [cart, setCart] = useState({});
      const [lightbox, setLightbox] = useState(null);
      const [customer, setCustomer] = useState("");
      const [phone, setPhone] = useState("");
      const [pickup, setPickup] = useState("delivery");
      const [postal, setPostal] = useState("");
      const [sub, setSub] = useState(""); const [dist, setDist] = useState(""); const [prov, setProv] = useState("");
      const [address, setAddress] = useState("");
      const [note, setNote] = useState("");
      const [postalMsg, setPostalMsg] = useState("");
      const [subOptions, setSubOptions] = useState([]);
      const [promoCode, setPromoCode] = useState("");
      const [promo, setPromo] = useState(null);
      const [invoice, setInvoice] = useState(false);
      const [invoiceName, setInvoiceName] = useState("");
      const [slipName, setSlipName] = useState("");
      const [err, setErr] = useState("");
      const [done, setDone] = useState(null);
      const [flash, setFlash] = useState("");
      const [settings, setSettings] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const [slipFile, setSlipFile] = useState(null);
      useEffect(() => { Store.settingsGet().then(setSettings).catch(()=>{}); }, []);

      const lines = useMemo(() => Object.entries(cart).filter(([,q])=>q>0).map(([sku,qty]) => ({ item: catalog.find(c=>c.id===sku), qty })).filter(l=>l.item), [cart, catalog]);
      const subtotal = useMemo(() => lines.reduce((s,l)=>s+l.item.price*l.qty,0), [lines]);
      const total = useMemo(() => (promo && promo.valid && typeof promo.discount_price==="number") ? promo.discount_price : subtotal, [subtotal, promo]);
      const totalQty = useMemo(() => lines.reduce((s,l)=>s+l.qty,0), [lines]);
      const totalPacks = useMemo(() => lines.reduce((s,l)=>s + l.qty*(l.item.packs||1), 0), [lines]);
      const setQty = (sku, q) => setCart(c => ({...c, [sku]: Math.max(0, Math.min(999, q))}));

      function pickSub(opt) { setSub(opt.subdistrict); setDist(opt.district); setProv(opt.province); }
      async function runPostal(code) {
        if (!/^\d{5}$/.test(code)) { setSubOptions([]); setPostalMsg(""); return; }
        setPostalMsg("กำลังค้นหาที่อยู่…");
        try {
          const matches = await lookupPostal(code);
          setSubOptions(matches);
          if (matches.length === 0) { setPostalMsg("ไม่พบรหัสไปรษณีย์นี้"); return; }
          setProv(matches[0].province); setDist(matches[0].district);
          if (matches.length === 1) { setSub(matches[0].subdistrict); setPostalMsg(matches[0].district + ", " + matches[0].province); }
          else { setSub(""); setPostalMsg("เลือกแขวง/ตำบลที่ถูกต้องด้านล่าง"); }
        } catch (e) { setPostalMsg("โหลดข้อมูลที่อยู่ไม่สำเร็จ ลองใหม่"); }
      }
      function onPostalChange(v) {
        const d = v.replace(/\D/g, "").slice(0, 5);
        setPostal(d);
        if (d.length === 5) runPostal(d); else { setSubOptions([]); setPostalMsg(""); }
      }
      function validate() {
        if (step===0) return lines.length ? "" : "กรุณาเลือกสินค้าอย่างน้อย 1 รายการ";
        if (step===1) {
          if (!customer.trim()) return "กรุณากรอกชื่อผู้รับ";
          if (!/^0\d{8,9}$/.test(phone)) return "เบอร์โทรไม่ถูกต้อง";
          if (pickup==="delivery") { if(!/^\d{5}$/.test(postal)) return "กรุณากรอกรหัสไปรษณีย์"; if(!address.trim()) return "กรุณากรอกที่อยู่"; }
          if (invoice && !invoiceName.trim()) return "กรุณากรอกชื่อสำหรับใบกำกับภาษี";
        }
        return "";
      }
      function next() { const e=validate(); if(e){setErr(e);return;} setErr(""); setStep(1); window.scrollTo({top:0}); }
      function back() { setErr(""); setStep(0); }
      function resetAll(){ setDone(null);setCart({});setStep(0);setPromo(null);setPromoCode("");setSlipFile(null);setCustomer("");setPhone("");setAddress("");setPostal("");setSub("");setDist("");setProv("");setNote("");setInvoice(false);setInvoiceName(""); window.scrollTo({top:0}); }
      function goHome(msg){ resetAll(); if(msg){ setFlash(msg); setTimeout(()=>setFlash(""), 7000); } }
      async function submit() {
        const e = validate(); if(e){ setErr(e); return; }
        setErr(""); setSubmitting(true);
        try {
          const payload = {
            customer: customer.trim(), phone: phone.trim(),
            items: lines.map(l=>({ sku_code:l.item.id, name:l.item.name, qty:l.qty, price:l.item.price })),
            amount: total, pickup_option: pickup,
            address: address.trim(), subdistrict: sub, district: dist, province: prov, postal_code: pickup==="delivery"?postal:"",
            additional_note: note.trim(), promo_code: (promo&&promo.valid)?promo.code:"",
            invoice_required: invoice, invoice_name: invoiceName.trim()
          };
          const order = await Store.createOrder(payload);
          if (slipFile) { try { const url = await Store.uploadSlip(order.order_id, slipFile); order.slip_url = url; } catch(se){ /* slip optional — ไม่ block */ } }
          if(order&&order.slip_url){ goHome("✓ รับออเดอร์ "+order.order_id+" และสลิปเรียบร้อยแล้ว — รอแอดมินยืนยันการชำระเงิน ขอบคุณค่ะ 🙏"); } else { setDone(order); window.scrollTo({top:0}); }
        } catch(er){ setErr("บันทึกออเดอร์ไม่สำเร็จ: " + (er&&er.message?er.message:er)); }
        finally { setSubmitting(false); }
      }

      if (done) {
        return (
          <Shell>
            <div className="mx-auto max-w-md">
              <div className="card text-center">
                <div className="mx-auto mb-3 grad flex h-16 w-16 items-center justify-center rounded-full text-3xl text-white">✓</div>
                <h2 className="text-xl font-extrabold">รับคำสั่งซื้อแล้ว 🎉</h2>
                <p className="mt-1 text-gray-500">เลขออเดอร์ <span className="font-mono font-semibold text-sixty-ink">{done.order_id}</span></p>
                <p className="mt-1 text-lg font-extrabold grad-text">{baht(done.amount)}</p>
                <p className="mt-2 text-xs text-gray-400">ออเดอร์ถูกบันทึกแล้ว — โอนเงินตาม QR แล้วแนบสลิป (ตอนนี้หรือทีหลังก็ได้)</p>
              </div>
              <div className="mt-4"><PaymentBox settings={settings} amount={done.amount} /></div>
              <SlipUploadBox order={done} onUploaded={(url)=>{ setDone({...done, slip_url:url}); setTimeout(()=>goHome("✓ อัปโหลดสลิปเรียบร้อยแล้ว — รอแอดมินยืนยันการชำระเงิน ขอบคุณค่ะ 🙏"), 1300); }} />
              <button className="mt-4 w-full rounded-xl border-2 border-sixty-blue px-5 py-3 font-semibold text-sixty-blued"
                onClick={resetAll}>สั่งซื้อรายการใหม่</button>
            </div>
          </Shell>
        );
      }

      return (
        <Shell>
          {step>0 && (
            <ol className="mx-auto mb-6 flex max-w-xl items-center gap-1">
              {STEPS.map((label,i) => (
                <li key={label} className="flex flex-1 flex-col items-center gap-1.5">
                  <div className={"flex h-9 w-9 items-center justify-center rounded-full text-sm font-bold " + (i<=step?"grad text-white shadow-md":"bg-white text-gray-400 border border-gray-200")}>{i+1}</div>
                  <span className={"text-xs " + (i===step?"font-bold text-sixty-blued":"text-gray-400")}>{label}</span>
                </li>
              ))}
            </ol>
          )}

          {step===0 && flash && (
            <div className="mx-auto mb-5 max-w-xl rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-center text-sm font-semibold text-emerald-700">{flash}</div>
          )}

          {step===0 && (
            <div>
              <section className="grad relative mb-6 overflow-hidden rounded-3xl px-5 py-8 text-white sm:px-10 sm:py-12">
                <div className="relative z-10 max-w-md">
                  <p className="text-[11px] font-semibold tracking-[.25em] opacity-80">SIXTY DEGREES · NATURAL MINERAL WATER</p>
                  <h2 className="mt-2 text-2xl font-extrabold leading-tight sm:text-4xl">น้ำแร่ธรรมชาติ 6ty°<br/>ส่งตรงถึงบ้าน 💧</h2>
                  <p className="mt-2 text-sm opacity-90 sm:text-base">สั่งง่าย ส่งไว โดยบุรุษไปรษณีย์ทั่วไทย</p>
                </div>
                <div className="pointer-events-none absolute -bottom-10 -right-4 select-none text-[140px] font-black leading-none opacity-10">6ty°</div>
              </section>

              <div className="mb-3 flex items-end justify-between">
                <h3 className="text-lg font-extrabold sm:text-xl">เลือกสินค้า</h3>
                <span className="text-sm text-gray-400">{catalog.length} รายการ</span>
              </div>

              {catalog.length===0 && <p className="card text-center text-sm text-gray-400">ยังไม่มีสินค้าให้สั่ง — เพิ่มได้ที่หน้า <a href="admin.html" className="font-semibold text-sixty-blued underline">Admin</a></p>}

              <div className="grid grid-cols-2 gap-3 sm:grid-cols-3 sm:gap-5 lg:grid-cols-4">
                {catalog.map(item => (
                  <ProductCard key={item.id} item={item} qty={cart[item.id]||0}
                    onAdd={()=>setQty(item.id, 1)} onChange={q=>setQty(item.id, q)} onImage={()=>item.image&&setLightbox(item)} />
                ))}
              </div>
            </div>
          )}

          {step===1 && (
            <div className="mx-auto max-w-xl space-y-4">
              <div><label className="label">ชื่อ-นามสกุลผู้รับ *</label><input className="field" value={customer} onChange={e=>setCustomer(e.target.value)} /></div>
              <div><label className="label">เบอร์โทรศัพท์ *</label><input className="field" inputMode="numeric" placeholder="0812345678" value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,""))} /></div>
              <div className="grid grid-cols-2 gap-2">
                <Chip active={pickup==="delivery"} onClick={()=>setPickup("delivery")}>จัดส่งถึงบ้าน</Chip>
                <Chip active={pickup==="pickup_self"} onClick={()=>setPickup("pickup_self")}>รับเองที่ไปรษณีย์</Chip>
              </div>
              {pickup==="delivery" && (
                <React.Fragment>
                  <div>
                    <label className="label">รหัสไปรษณีย์ *</label>
                    <input className="field" inputMode="numeric" maxLength={5} value={postal} onChange={e=>onPostalChange(e.target.value)} placeholder="เช่น 10100" />
                    {postalMsg && <p className="mt-1 text-xs text-sixty-blued">{postalMsg}</p>}
                  </div>
                  {subOptions.length > 1 ? (
                    <div>
                      <label className="label">แขวง/ตำบล * <span className="font-normal text-gray-400">(เลือกจากรหัสไปรษณีย์)</span></label>
                      <select className="field" value={sub} onChange={e=>{ const i=e.target.selectedIndex-1; if(i>=0) pickSub(subOptions[i]); }}>
                        <option value="">— เลือกแขวง/ตำบล —</option>
                        {subOptions.map((o,i)=> <option key={i} value={o.subdistrict}>{o.subdistrict} ({o.district})</option>)}
                      </select>
                    </div>
                  ) : (
                    <div><label className="label">แขวง/ตำบล</label><input className="field" value={sub} onChange={e=>setSub(e.target.value)} /></div>
                  )}
                  <div className="grid grid-cols-2 gap-2">
                    <div><label className="label">เขต/อำเภอ</label><input className="field" value={dist} onChange={e=>setDist(e.target.value)} /></div>
                    <div><label className="label">จังหวัด</label><input className="field" value={prov} onChange={e=>setProv(e.target.value)} /></div>
                  </div>
                  <div><label className="label">บ้านเลขที่ / รายละเอียดที่อยู่ *</label><textarea className="field" rows={2} value={address} onChange={e=>setAddress(e.target.value)} /></div>
                </React.Fragment>
              )}
              <div><label className="label">หมายเหตุ (ไม่บังคับ)</label><input className="field" value={note} onChange={e=>setNote(e.target.value)} /></div>
            </div>
          )}

          {step===1 && (
            <div className="mx-auto max-w-xl space-y-4">
              <div className="card">
                <label className="label">โค้ดส่วนลด</label>
                <div className="flex gap-2">
                  <input className="field" value={promoCode} onChange={e=>setPromoCode(e.target.value.toUpperCase())} placeholder="ลอง DEMO50" />
                  <button className="shrink-0 rounded-xl border-2 border-sixty-blue px-5 font-semibold text-sixty-blued" onClick={()=>setPromo(checkPromo(promoCode))}>ใช้โค้ด</button>
                </div>
                {promo && <p className={"mt-2 text-sm font-medium " + (promo.valid?"text-emerald-600":"text-sixty-pink")}>{promo.valid?"✓ ":"✕ "}{promo.message}</p>}
              </div>
              <PaymentBox settings={settings} amount={total} />
              <div className="card">
                <label className="label">แนบสลิป <span className="font-normal text-gray-400">(ไม่บังคับ — อัปทีหลังได้)</span></label>
                <input type="file" accept="image/*" className="block w-full text-sm file:mr-3 file:rounded-lg file:border-0 file:bg-sixty-mist file:px-3 file:py-2 file:font-semibold file:text-sixty-blued" onChange={e=>{ setSlipFile(e.target.files[0]||null); setSlipName(e.target.files[0]?.name||""); }} />
                {slipName && <p className="mt-2 text-xs text-emerald-600">✓ {slipName}</p>}
                <p className="mt-2 text-xs text-gray-400">ยังไม่พร้อม? กดยืนยันได้เลย ออเดอร์จะถูกบันทึก แล้วอัปสลิปทีหลังในหน้าถัดไปได้</p>
              </div>
              <div className="card">
                <label className="flex items-center gap-2"><input type="checkbox" className="h-4 w-4 accent-sixty-pink" checked={invoice} onChange={e=>setInvoice(e.target.checked)} /><span className="font-semibold">ต้องการใบกำกับภาษี</span></label>
                {invoice && <input className="field mt-3" placeholder="ชื่อ/บริษัท" value={invoiceName} onChange={e=>setInvoiceName(e.target.value)} />}
              </div>
            </div>
          )}

          {step===1 && (
            <div className="mx-auto max-w-xl space-y-3">
              <div className="card">
                <h3 className="mb-2 font-bold">รายการสินค้า</h3>
                {lines.map(l => (
                  <div key={l.item.id} className="flex justify-between py-1 text-sm"><span>{l.item.name} × {l.qty}</span><span className="font-medium">{baht(l.item.price*l.qty)}</span></div>
                ))}
                <div className="mt-2 border-t border-dashed pt-2">
                  {promo && promo.valid && typeof promo.discount_price==="number" && (
                    <div className="flex justify-between text-sm text-gray-400"><span>ราคาปกติ</span><span className="line-through">{baht(subtotal)}</span></div>
                  )}
                  <div className="flex justify-between text-lg font-extrabold"><span>ยอดชำระ</span><span className="grad-text">{baht(total)}</span></div>
                </div>
              </div>
              <div className="card text-sm">
                <h3 className="mb-2 font-bold">ผู้รับ</h3>
                <p>{customer} · {phone}</p>
                {pickup==="delivery" ? <p className="text-gray-500">{address} {sub} {dist} {prov} {postal}</p> : <p className="text-gray-500">รับเองที่ที่ทำการไปรษณีย์</p>}
                {invoice && <p className="mt-1 text-gray-500">ออกใบกำกับ: {invoiceName}</p>}
              </div>
            </div>
          )}

          {err && <p className="mx-auto mt-4 max-w-xl rounded-xl bg-pink-50 px-4 py-2 text-sm font-medium text-sixty-pink">{err}</p>}

          <div className="fixed inset-x-0 bottom-0 z-40 border-t border-gray-100 bg-white/90 backdrop-blur">
            <div className="mx-auto flex max-w-3xl items-center gap-3 px-4 py-3">
              {step>0 && <button className="rounded-xl border-2 border-gray-200 px-5 py-3 font-semibold text-gray-600" onClick={back}>ย้อนกลับ</button>}
              <div className="flex-1 text-sm">
                {totalQty>0
                  ? <span className="text-gray-500">🛒 {totalQty} ชิ้น · <b className="text-sixty-blued">{totalPacks} แพ็ค</b> · <b className="text-sixty-ink">{baht(total)}</b></span>
                  : <span className="text-gray-300">ตะกร้าว่าง</span>}
              </div>
              {step===0
                ? <button className="btn-grad px-7 py-3 disabled:opacity-40" onClick={next} disabled={totalQty===0}>ดำเนินการสั่งซื้อ</button>
                : <button className="btn-grad px-7 py-3 disabled:opacity-50" onClick={submit} disabled={submitting}>{submitting?"กำลังบันทึก…":"ยืนยันคำสั่งซื้อ"}</button>}
            </div>
          </div>

          {lightbox && (
            <div onClick={()=>setLightbox(null)} role="dialog" aria-modal="true"
              className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4 backdrop-blur-sm">
              <button onClick={()=>setLightbox(null)} aria-label="ปิด"
                className="absolute right-4 top-4 flex h-11 w-11 items-center justify-center rounded-full bg-white/90 text-2xl font-bold text-gray-700 shadow-lg active:scale-95">✕</button>
              <div className="w-full max-w-sm" onClick={e=>e.stopPropagation()}>
                <img src={lightbox.image} alt={lightbox.name} className="mx-auto max-h-[68vh] w-auto rounded-2xl object-contain shadow-2xl" />
                <div className="mt-3 rounded-2xl bg-white p-4 text-center">
                  <div className="flex items-center justify-center gap-2">
                    <p className="font-bold">{lightbox.name}</p>
                    {lightbox.label && <span className="grad rounded-full px-2 py-0.5 text-[11px] font-semibold text-white">{lightbox.label}</span>}
                  </div>
                  {lightbox.description && <p className="mt-0.5 text-sm text-gray-500">{lightbox.description}</p>}
                  <p className="mt-1 font-extrabold grad-text">{baht(lightbox.price)}</p>
                </div>
                <p className="mt-3 text-center text-xs text-white/70">แตะที่ว่างเพื่อปิด</p>
              </div>
            </div>
          )}
        </Shell>
      );
    }

    function Shell({ children }) {
      return (
        <div className="min-h-screen pb-28">
          <div className="bg-amber-50 py-1.5 text-center text-[11px] text-amber-700">🧪 เวอร์ชันเดโม — ทำงานในเบราว์เซอร์ล้วน ไม่เชื่อมต่อระบบจริง</div>
          <header className="sticky top-0 z-40 border-b border-gray-100 bg-white/85 backdrop-blur">
            <div className="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-2.5">
              <a href="index.html" className="flex items-center gap-2.5">
                <Bottle size={40} />
                <div className="leading-none">
                  <span className="text-xl font-extrabold"><span className="grad-text">6ty</span><span className="text-sixty-pink">°</span></span>
                  <p className="mt-0.5 hidden text-[10px] font-semibold tracking-[.2em] text-gray-400 sm:block">SIXTY DEGREES · MINERAL WATER</p>
                </div>
              </a>
              <a href="admin.html" className="rounded-full border border-gray-200 px-3 py-1.5 text-xs font-semibold text-gray-500 transition hover:border-sixty-blue hover:text-sixty-blued">Admin</a>
            </div>
          </header>
          <main className="mx-auto w-full max-w-6xl px-4 pt-5 sm:pt-6">{children}</main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Compile JSX with CLASSIC runtime (uses React.createElement, no `import`), then run.
    (function () {
      try {
        var src = document.getElementById("app-src").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        new Function(out)();
      } catch (e) {
        document.getElementById("root").innerHTML =
          '<pre style="padding:16px;color:#EC0A8C;white-space:pre-wrap">โหลดเดโมไม่สำเร็จ: ' +
          (e && e.message ? e.message : e) + '</pre>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
